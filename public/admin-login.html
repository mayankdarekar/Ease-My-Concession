<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — Ease My Concession</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;} @keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-[#1a3a6b] flex items-center justify-center p-4">
<div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
  <div class="text-center mb-6">
    <div class="text-5xl mb-2">🛡️</div>
    <h2 class="text-2xl font-bold text-[#1a3a6b]" style="font-family:'Outfit',sans-serif;">Admin Login</h2>
    <p class="text-slate-400 text-sm mt-1">College Authority Portal</p>
  </div>
  <div id="alert"></div>
  <form id="form">
    <div class="mb-4"><label class="block text-sm font-semibold mb-1.5">Username</label><input id="username" type="text" class="w-full px-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100" placeholder="admin" required/></div>
    <div class="mb-6"><label class="block text-sm font-semibold mb-1.5">Password</label><input id="password" type="password" class="w-full px-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100" placeholder="••••••••" required/></div>
    <button type="submit" id="btn" class="w-full py-3 bg-[#1a3a6b] text-white font-bold rounded-xl hover:brightness-90 transition flex items-center justify-center gap-2">Sign In as Admin</button>
  </form>
  <div class="mt-5 p-4 bg-slate-50 rounded-xl text-xs text-slate-400">
    <p class="font-bold mb-1 text-slate-500">Default credentials:</p>
    <p>Username: <code class="bg-slate-200 px-1.5 py-0.5 rounded font-mono">admin</code></p>
    <p class="mt-1">Password: <code class="bg-slate-200 px-1.5 py-0.5 rounded font-mono">admin123</code></p>
  </div>
  <p class="text-center text-xs text-slate-400 mt-4"><a href="/login" class="hover:underline">← Student Login</a></p>
</div>
<script>
  if (localStorage.getItem('adminToken')) location.href='/admin-dashboard';
  document.getElementById('form').onsubmit = async (e) => {
    e.preventDefault();
    const btn=document.getElementById('btn'), alertEl=document.getElementById('alert');
    alertEl.innerHTML=''; btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;"></span> Signing in...';
    try{
      const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});
      const d=await res.json(); if(!res.ok) throw new Error(d.message);
      localStorage.setItem('adminToken',d.token); localStorage.setItem('adminUser',JSON.stringify(d.user));
      location.href='/admin-dashboard';
    }catch(err){alertEl.innerHTML=`<div class="bg-red-50 border-l-4 border-red-500 text-red-700 text-sm p-3 rounded-xl mb-4">${err.message}</div>`;btn.disabled=false;btn.innerHTML='Sign In as Admin';}
  };
</script>
</body>
</html>
