<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — Ease My Concession</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#1a3a6b] to-blue-600 flex items-center justify-center p-4">
<div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
  <div class="text-center mb-6">
    <div class="font-extrabold text-2xl text-[#1a3a6b]" style="font-family:'Outfit',sans-serif;">🚂 EaseMyConcession</div>
    <h2 class="text-2xl font-bold text-[#1a3a6b] mt-3" style="font-family:'Outfit',sans-serif;">Student Login</h2>
    <p class="text-slate-400 text-sm mt-1">Sign in to manage your concession pass</p>
  </div>
  <div id="alert"></div>
  <form id="form">
    <div class="mb-4">
      <label class="block text-sm font-semibold mb-1.5">Email</label>
      <input id="email" type="email" class="w-full px-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100" placeholder="you@college.edu" required/>
    </div>
    <div class="mb-6">
      <label class="block text-sm font-semibold mb-1.5">Password</label>
      <input id="password" type="password" class="w-full px-3 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100" placeholder="••••••••" required/>
    </div>
    <button type="submit" id="btn" class="w-full py-3 bg-[#1a3a6b] text-white font-bold rounded-xl hover:brightness-90 transition flex items-center justify-center gap-2">Login</button>
  </form>
  <p class="text-center text-sm text-slate-400 mt-5">Don't have an account? <a href="/signup" class="text-blue-500 font-semibold">Sign Up</a></p>
  <p class="text-center text-xs text-slate-300 mt-2"><a href="/admin-login" class="hover:underline">Admin Login →</a></p>
</div>
<script>
  const getToken = () => localStorage.getItem('token') || '';
  if (getToken()) location.href = '/dashboard';
  document.getElementById('form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';
    btn.disabled = true; btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;"></span> Logging in...';
    try {
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }) });
      const d = await res.json();
      if (!res.ok) throw new Error(d.message);
      localStorage.setItem('token', d.token);
      localStorage.setItem('user', JSON.stringify(d.user));
      location.href = '/dashboard';
    } catch(err) {
      alertEl.innerHTML = `<div class="bg-red-50 border-l-4 border-red-500 text-red-700 text-sm p-3 rounded-lg mb-4">${err.message}</div>`;
      btn.disabled = false; btn.innerHTML = 'Login';
    }
  };
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
