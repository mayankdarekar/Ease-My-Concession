<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Application Status — Ease My Concession</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;} @keyframes spin{to{transform:rotate(360deg)}} .spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(0,0,0,.1);border-top-color:#1a3a6b;border-radius:50%;animation:spin .7s linear infinite;}</style>
</head>
<body class="bg-slate-50 min-h-screen">
<nav class="h-[72px] flex items-center justify-between bg-white border-b border-slate-200 px-6 md:px-10 sticky top-0 z-50 shadow-sm">
  <a href="/" class="font-extrabold text-xl text-[#1a3a6b]" style="font-family:'Outfit',sans-serif;">🚂 EaseMyConcession</a>
  <div class="flex gap-3">
    <a href="/dashboard" class="px-4 py-2 border-2 border-[#1a3a6b] text-[#1a3a6b] font-semibold text-sm rounded-xl hover:bg-slate-50">← Dashboard</a>
    <button onclick="localStorage.clear();location.href='/login'" class="px-4 py-2 border-2 border-[#1a3a6b] text-[#1a3a6b] font-semibold text-sm rounded-xl hover:bg-slate-50">Logout</button>
  </div>
</nav>
<div class="max-w-2xl mx-auto px-6 py-10">
  <a href="/dashboard" class="text-sm text-slate-400 hover:text-slate-600 mb-6 inline-block">← Back to Dashboard</a>
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-2xl font-extrabold text-[#1a3a6b]" style="font-family:'Outfit',sans-serif;">Application Status</h1>
      <select id="sel" class="hidden text-sm px-3 py-1.5 border border-slate-200 rounded-xl focus:outline-none"></select>
    </div>
    <p class="text-slate-400 text-sm mb-8">Track your concession pass application.</p>
    <div id="loading" class="py-10 text-center text-slate-400"><div class="spin mx-auto mb-3"></div>Loading…</div>
    <div id="empty" class="hidden py-10 text-center"><div class="text-5xl mb-3">📭</div><p class="text-slate-400">No applications found.</p></div>
    <div id="content" class="hidden">
      <!-- Stepper -->
      <div class="relative flex justify-between items-start mb-10" id="stepper">
        <div class="absolute top-5 left-0 right-0 h-0.5 bg-slate-200 z-0"></div>
        <div class="absolute top-5 left-0 h-0.5 bg-[#1a3a6b] z-0 transition-all duration-500" id="progress"></div>
        <div class="flex flex-col items-center text-center z-10 flex-1" id="s0">
          <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mb-2 bg-[#1a3a6b] text-white border-2 border-[#1a3a6b]">✓</div>
          <span class="text-xs font-semibold text-slate-600">Submitted</span>
        </div>
        <div class="flex flex-col items-center text-center z-10 flex-1" id="s1">
          <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mb-2 bg-slate-200 text-slate-400 border-2 border-slate-200" id="d1">2</div>
          <span class="text-xs font-semibold text-slate-400" id="l1">Under Verification</span>
        </div>
        <div class="flex flex-col items-center text-center z-10 flex-1" id="s2">
          <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mb-2 bg-slate-200 text-slate-400 border-2 border-slate-200" id="d2">3</div>
          <span class="text-xs font-semibold text-slate-400" id="l2">Approved / Rejected</span>
        </div>
      </div>
      <!-- Rejection reason -->
      <div id="rejBox" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 text-sm p-3 rounded-xl mb-5"></div>
      <!-- Details -->
      <div class="grid grid-cols-2 gap-3 mb-6" id="details"></div>
      <!-- Download -->
      <button id="dlBtn" disabled class="w-full py-3 bg-[#1a3a6b] text-white font-bold rounded-xl opacity-50 cursor-not-allowed flex items-center justify-center gap-2">
        📥 Download Pass (Available after approval)
      </button>
    </div>
  </div>
</div>
<footer class="bg-slate-100 border-t border-slate-200 py-4 text-center text-xs text-slate-400 mt-10">🚂 Ease My Concession — Student Portal</footer>
<script>
  if (!localStorage.getItem('token')) location.href='/login';
  const tok = () => localStorage.getItem('token')||'';
  const fmt = (d) => d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
  let sel = null, apps = [];

  async function load() {
    const res = await fetch('/api/student/applications',{headers:{'Authorization':`Bearer ${tok()}`}});
    const d   = await res.json();
    if (!res.ok){localStorage.clear();location.href='/login';return;}
    apps = d.applications||[];
    document.getElementById('loading').classList.add('hidden');
    if (!apps.length){document.getElementById('empty').classList.remove('hidden');return;}
    if (apps.length>1){
      const s=document.getElementById('sel'); s.classList.remove('hidden');
      s.innerHTML=apps.map((a,i)=>`<option value="${i}">App #${i+1} — ${a.status}</option>`).join('');
      s.onchange=()=>render(apps[parseInt(s.value)]);
    }
    render(apps[0]);
  }

  function render(app) {
    sel=app; document.getElementById('content').classList.remove('hidden');
    const s=app.status;
    // Progress
    document.getElementById('progress').style.width = s==='Pending'?'0%':s==='Under Verification'?'50%':'100%';
    // Step 1
    if(['Under Verification','Approved','Rejected'].includes(s)){
      document.getElementById('d1').className='w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mb-2 text-white border-2 '+(s==='Under Verification'?'bg-blue-500 border-blue-500':'bg-[#1a3a6b] border-[#1a3a6b]');
      document.getElementById('d1').textContent=s==='Under Verification'?'2':'✓';
      document.getElementById('l1').className='text-xs font-semibold text-slate-700';
    }
    // Step 2
    if(s==='Approved'){document.getElementById('d2').className='w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mb-2 bg-green-600 text-white border-2 border-green-600';document.getElementById('d2').textContent='✓';document.getElementById('l2').textContent='Approved';document.getElementById('l2').className='text-xs font-semibold text-green-600';}
    if(s==='Rejected'){document.getElementById('d2').className='w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm mb-2 bg-red-600 text-white border-2 border-red-600';document.getElementById('d2').textContent='✕';document.getElementById('l2').textContent='Rejected';document.getElementById('l2').className='text-xs font-semibold text-red-600';}
    // Rejection
    const rb=document.getElementById('rejBox');
    if(s==='Rejected'&&app.rejection_reason){rb.classList.remove('hidden');rb.innerHTML=`<strong>Rejection Reason:</strong> ${app.rejection_reason}`;}
    else rb.classList.add('hidden');
    // Details
    const sc={'Approved':'text-green-700','Rejected':'text-red-600','Under Verification':'text-purple-700','Pending':'text-yellow-700'};
    document.getElementById('details').innerHTML = [
      ['Route',`${app.source_station} → ${app.destination_station}`],
      ['Duration',app.duration],['Applied',fmt(app.applied_date)],
      ['Pass ID',app.pass_id||'—'],['Expiry Date',fmt(app.expiry_date)],
      ['Status',`<span class="font-bold ${sc[s]||''}">${s}</span>`],
    ].map(([l,v])=>`<div class="bg-slate-50 rounded-xl p-3 border border-slate-100"><p class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">${l}</p><p class="text-sm font-semibold">${v}</p></div>`).join('');
    // Download btn
    const btn=document.getElementById('dlBtn');
    if(s==='Approved'){btn.disabled=false;btn.className='w-full py-3 bg-[#1a3a6b] text-white font-bold rounded-xl hover:brightness-90 transition flex items-center justify-center gap-2';btn.innerHTML='📥 Download Concession Pass (PDF)';btn.onclick=dlPass;}
  }

  async function dlPass(){
    const btn=document.getElementById('dlBtn'); btn.innerHTML='<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;"></span> Generating…'; btn.disabled=true;
    const res=await fetch(`/api/student/download-pass/${sel.id}`,{headers:{'Authorization':`Bearer ${tok()}`}});
    if(!res.ok){const d=await res.json();alert(d.message);btn.disabled=false;btn.innerHTML='📥 Download Concession Pass (PDF)';return;}
    const blob=await res.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`pass_${sel.id}.pdf`;a.click();URL.revokeObjectURL(url);
    btn.innerHTML='📥 Download Concession Pass (PDF)';btn.disabled=false;
  }

  load();
</script>
</body>
</html>
